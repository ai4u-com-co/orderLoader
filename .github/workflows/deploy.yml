name: Deploy OrderLoader to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/orderLoader
            git pull origin main
            docker compose up -d --build
            # Asegurar permisos de la base de datos después de actualizar
            docker exec -u root orderloader chown -R node:node /app/.data
            docker exec -u root orderloader chmod -R 777 /app/.data
