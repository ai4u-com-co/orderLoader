name: flexoimpresos-ol

# El host de Flexo (serverflexo, Windows) corre esta imagen ya construida por
# .github/workflows/publish-image.yml (ghcr.io/donchelo/orderloader) — Watchtower
# la actualiza sola en cada push a main. No se buildea local en ese host.

services:
  orderloader-flexo:
    image: ghcr.io/donchelo/orderloader:latest
    container_name: orderloader-flexo
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - DATA_DIR=/app/.data
      - TZ=America/Bogota
    env_file:
      - .env.flexoimpresos
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./.data.flexoimpresos:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: orderloader-flexo-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - TZ=America/Bogota
      # El cliente Docker embebido en la imagen de Watchtower negocia API 1.25 por
      # defecto; hosts con daemon reciente (>=1.40) lo rechazan.
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
